<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICFR Control Repository | Sanad Group</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f4f2ec; color: #26241e; }
    #root { min-height: 100vh; }

    /* Login */
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f4f2ec; }
    .login-card  { background:#fffdf7; border:1px solid #ded7c4; padding:36px 32px; width:360px; box-shadow:4px 4px 0 rgba(38,36,30,.1); }
    .login-card h1 { font-size:18px; font-weight:600; margin-bottom:4px; }
    .login-card p  { font-size:12px; color:#8a8472; font-family:monospace; margin-bottom:24px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-family:monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:#8a8472; margin-bottom:4px; }
    .field input  { width:100%; border:1px solid #c8bfa6; padding:8px 10px; font-size:13px; background:#f4f2ec; font-family:monospace; }
    .field input:focus { outline:2px solid #3b6d11; }
    .err  { font-size:12px; color:#a32d2d; margin-bottom:10px; font-family:monospace; }
    .btn-login { width:100%; background:#26241e; color:#f4f2ec; border:none; padding:10px; font-family:monospace; font-size:13px; cursor:pointer; letter-spacing:.04em; }
    .btn-login:hover { background:#3a3830; }
    .btn-login:disabled { opacity:.5; cursor:not-allowed; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, createContext, useContext } = React;

/* ══════════════════════════════════════════
   ▸ CONFIGURATION — fill these in
══════════════════════════════════════════ */
const SUPABASE_URL  = "https://cfqxeuedcbscnupgqxxw.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmcXhldWVkY2JzY251cGdxeHh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzEyMTIsImV4cCI6MjA5NjI0NzIxMn0.D_B7n6tQwI67Knjl_wdBpwyao0r1ZciwzblcZ7AgBbg";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ══════════════════════════════════════════
   ▸ CONSTANTS
══════════════════════════════════════════ */
const STATUSES = ["Draft","Submitted","Under Review","Reviewed — Returned","Active","Under Testing","Tested","Signed Off"];
const EXEMPT   = ["Under Review","Reviewed — Returned","Tested","Signed Off"];
const S_COLOR  = {
  "Draft":               {bg:"#f1efe8",fg:"#5f5e5a",border:"#b4b2a9"},
  "Submitted":           {bg:"#e6f1fb",fg:"#185fa5",border:"#85b7eb"},
  "Under Review":        {bg:"#faeeda",fg:"#854f0b",border:"#ef9f27"},
  "Reviewed — Returned": {bg:"#fcebeb",fg:"#a32d2d",border:"#f09595"},
  "Active":              {bg:"#eaf3de",fg:"#3b6d11",border:"#97c459"},
  "Under Testing":       {bg:"#faeeda",fg:"#633806",border:"#fac775"},
  "Tested":              {bg:"#e6f1fb",fg:"#0c447c",border:"#b5d4f4"},
  "Signed Off":          {bg:"#eaf3de",fg:"#27500a",border:"#c0dd97"},
};
const COLS = [
  {key:"control_ref",         label:"Ref",        w:80},
  {key:"control_description", label:"Description",w:190},
  {key:"risk_description",    label:"Risk",       w:150},
  {key:"control_type",        label:"Type",       w:75},
  {key:"control_nature",      label:"Nature",     w:75},
  {key:"frequency",           label:"Freq",       w:75},
  {key:"assertion",           label:"Assertion",  w:105},
  {key:"control_owner",       label:"Owner",      w:105},
];

/* ══════════════════════════════════════════
   ▸ HELPERS
══════════════════════════════════════════ */
const fmt = (d) => {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
};
const isOverdue = (c) => {
  if (!c.due_date || EXEMPT.includes(c.status)) return false;
  return new Date(c.due_date) < new Date(new Date().toDateString());
};
const uid = () => crypto.randomUUID();

/* ══════════════════════════════════════════
   ▸ SUBCOMPONENTS
══════════════════════════════════════════ */
const Badge = ({status, small}) => {
  const t = S_COLOR[status] || S_COLOR["Draft"];
  return (
    <span style={{fontFamily:"monospace",fontSize:small?9:10,padding:small?"2px 5px":"3px 7px",
      borderRadius:4,background:t.bg,color:t.fg,border:`1px solid ${t.border}`,whiteSpace:"nowrap"}}>
      {status}
    </span>
  );
};

const ProgressBar = ({value, color="#3b6d11", bg="#eaf3de"}) => (
  <div style={{height:6,background:bg,borderRadius:3,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(100,value||0)}%`,background:color,borderRadius:3,transition:"width .3s"}}/>
  </div>
);

/* ══════════════════════════════════════════
   ▸ LOGIN PAGE
══════════════════════════════════════════ */
const LoginPage = ({onLogin}) => {
  const [email, setEmail]   = useState("");
  const [pass,  setPass]    = useState("");
  const [err,   setErr]     = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setErr(""); setLoading(true);
    const {data, error} = await sb.auth.signInWithPassword({email, password: pass});
    if (error) { setErr(error.message); setLoading(false); return; }
    // fetch profile
    const {data: profile} = await sb.from("profiles").select("*").eq("id", data.user.id).single();
    onLogin(data.user, profile);
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <h1>ICFR Control Repository</h1>
        <p>Sanad Group · Internal Controls</p>
        <div className="field">
          <label>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="your@email.com"/>
        </div>
        <div className="field">
          <label>Password</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••"/>
        </div>
        {err && <div className="err">{err}</div>}
        <button className="btn-login" onClick={handleLogin} disabled={loading}>
          {loading ? "Signing in…" : "Sign In →"}
        </button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════
   ▸ MAIN APP
══════════════════════════════════════════ */
const App = () => {
  const [user,    setUser]    = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  // check session on load
  useEffect(() => {
    sb.auth.getSession().then(async ({data}) => {
      if (data.session) {
        const {data: p} = await sb.from("profiles").select("*").eq("id", data.session.user.id).single();
        setUser(data.session.user);
        setProfile(p);
      }
      setLoading(false);
    });
    sb.auth.onAuthStateChange((_event, session) => {
      if (!session) { setUser(null); setProfile(null); }
    });
  }, []);

  if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"monospace",fontSize:12,color:"#8a8472"}}>Loading…</div>;
  if (!user || !profile) return <LoginPage onLogin={(u,p)=>{setUser(u);setProfile(p);}}/>;

  return <ICFRTool user={user} profile={profile} onSignOut={async()=>{await sb.auth.signOut();setUser(null);setProfile(null);}}/>;
};

/* ══════════════════════════════════════════
   ▸ ICFR TOOL (main shell)
══════════════════════════════════════════ */
const ICFRTool = ({user, profile, onSignOut}) => {
  const isAdmin = profile?.role === "admin";
  const [page, setPage]               = useState("dashboard");
  const [processes, setProcesses]     = useState([]);
  const [controls, setControls]       = useState([]);
  const [testAttrs, setTestAttrs]     = useState([]);
  const [evidence, setEvidence]       = useState([]);
  const [populations, setPopulations] = useState([]);
  const [samples, setSamples]         = useState([]);
  const [comments, setComments]       = useState([]);
  const [exceptions, setExceptions]   = useState([]);
  const [periods, setPeriods]         = useState([]);
  const [activePeriod, setActivePeriod] = useState("Jan 2026");
  const [activeProcess, setActiveProcess] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [search, setSearch]           = useState("");
  const [editingCell, setEditingCell] = useState(null);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [selectedProcs, setSelectedProcs] = useState(new Set());
  const [downloadMenu, setDownloadMenu] = useState(null);
  const [filterOpen, setFilterOpen]   = useState(false);
  const [filters, setFilters]         = useState({status:"",type:"",overdue:false});
  const [sortKey, setSortKey]         = useState(null);
  const [sortDir, setSortDir]         = useState("asc");
  const [toast, setToast]             = useState(null);
  const [dataLoading, setDataLoading] = useState(true);

  // modals
  const [reviewModal,  setReviewModal]  = useState(null);
  const [popModal,     setPopModal]     = useState(null);
  const [attrModal,    setAttrModal]    = useState(null);
  const [threadModal,  setThreadModal]  = useState(null);
  const [excModal,     setExcModal]     = useState(null);
  const [addProcModal, setAddProcModal] = useState(false);
  const [rollModal,    setRollModal]    = useState(false);
  const [emailModal,   setEmailModal]   = useState(false);
  const [commentDraft, setCommentDraft] = useState("");
  const [sampleInput,  setSampleInput]  = useState("");
  const [attrInput,    setAttrInput]    = useState("");
  const [newProc,      setNewProc]      = useState({name:"",description:""});
  const [rollTarget,   setRollTarget]   = useState("");
  const [excDraft,     setExcDraft]     = useState({type:isAdmin?"test":"owner",severity:"Medium",description:"",remediation:"",target_date:""});
  const [uploadingAttr, setUploadingAttr] = useState(null);
  const [testedUpload,  setTestedUpload]  = useState(null);

  const attrEvRef   = useRef(null);
  const testedEvRef = useRef(null);
  const popFileRef  = useRef(null);
  const evFileRef   = useRef(null);
  const xlsRef      = useRef(null);

  const showToast = (msg) => {setToast(msg); setTimeout(()=>setToast(null), 2600);};

  /* ── LOAD DATA ── */
  useEffect(() => { loadAll(); }, []);

  const loadAll = async () => {
    setDataLoading(true);
    const [proc, per, ctrl, attr, ev, pop, samp, cmts, exc] = await Promise.all([
      sb.from("processes").select("*").order("name"),
      sb.from("periods").select("*").order("id"),
      isAdmin
        ? sb.from("controls").select("*").order("control_ref")
        : sb.from("controls").select("*, assignments!inner(user_id)").eq("assignments.user_id", user.id).order("control_ref"),
      sb.from("test_attrs").select("*").order("seq"),
      sb.from("evidence").select("*"),
      sb.from("populations").select("*"),
      sb.from("samples").select("*"),
      sb.from("comments").select("*").order("created_at"),
      sb.from("exceptions").select("*").order("created_at"),
    ]);
    setProcesses(proc.data||[]);
    setPeriods(per.data||[]);
    setControls((ctrl.data||[]).map(c=>({...c, needs_population:!!c.needs_population})));
    setTestAttrs(attr.data||[]);
    setEvidence(ev.data||[]);
    setPopulations(pop.data||[]);
    setSamples(samp.data||[]);
    setComments(cmts.data||[]);
    setExceptions(exc.data||[]);
    if (proc.data?.length) setActiveProcess(proc.data[0].id);
    setDataLoading(false);
  };

  const logAudit = async (action, ref, detail) => {
    await sb.from("audit_log").insert({id:uid(), action, ref, detail, performed_by: user.id});
  };

  /* ── HELPERS ── */
  const ctrlAttrs   = (cid) => testAttrs.filter(a=>a.control_id===cid).sort((a,b)=>a.seq-b.seq);
  const ctrlSamples = (cid) => samples.filter(s=>s.control_id===cid);
  const popForCtrl  = (cid) => populations.filter(p=>p.control_id===cid);
  const ctrlCmts    = (cid) => comments.filter(c=>c.control_id===cid);
  const attrEv      = (cid,aid,ver=null) => evidence.filter(e=>e.control_id===cid&&e.attr_id===aid&&(!ver||e.version===ver));
  const sampleEv    = (sid,ver=null) => evidence.filter(e=>e.sample_id===sid&&(!ver||e.version===ver));
  const ctrlExc     = (cid) => exceptions.filter(e=>e.control_id===cid);

  /* ── ANALYTICS ── */
  const procStats = (pid) => {
    const ctrls = controls.filter(c=>c.process_id===pid&&c.period===activePeriod);
    const total  = ctrls.length;
    const byStatus = STATUSES.reduce((acc,s)=>({...acc,[s]:ctrls.filter(c=>c.status===s).length}),{});
    const allAttrs = testAttrs.filter(a=>ctrls.some(c=>c.id===a.control_id));
    const totalAttrs   = allAttrs.length;
    const evidenceDone = allAttrs.filter(a=>attrEv(a.control_id,a.id,"owner").length>0).length;
    const testedDone   = allAttrs.filter(a=>attrEv(a.control_id,a.id,"tested").length>0).length;
    const evidencePct  = totalAttrs===0?0:Math.round(evidenceDone/totalAttrs*100);
    const testedPct    = totalAttrs===0?0:Math.round(testedDone/totalAttrs*100);
    const signedOff    = ctrls.filter(c=>c.status==="Signed Off").length;
    const completionPct = total===0?0:Math.round(signedOff/total*100);
    const overdueCount  = ctrls.filter(c=>isOverdue(c)).length;
    const returnedCount = ctrls.filter(c=>c.status==="Reviewed — Returned").length;
    return {total,byStatus,totalAttrs,evidencePct,testedPct,completionPct,signedOff,evidenceDone,testedDone,overdueCount,returnedCount};
  };

  /* ── VISIBLE CONTROLS ── */
  const visible = useMemo(()=>{
    let rows = controls.filter(c=>c.process_id===activeProcess&&c.period===activePeriod);
    if (search.trim()) { const q=search.toLowerCase(); rows=rows.filter(c=>Object.values(c).some(v=>String(v).toLowerCase().includes(q))); }
    if (filters.status) rows=rows.filter(c=>c.status===filters.status);
    if (filters.type)   rows=rows.filter(c=>c.control_type===filters.type);
    if (filters.overdue) rows=rows.filter(c=>isOverdue(c));
    if (sortKey) rows=[...rows].sort((a,b)=>{
      const av=String(a[sortKey]||""),bv=String(b[sortKey]||"");
      return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    });
    return rows;
  },[controls,activeProcess,activePeriod,search,filters,sortKey,sortDir]);

  /* ── ACTIONS ── */
  const updateControl = async (id, patch) => {
    await sb.from("controls").update({...patch, updated_at: new Date().toISOString()}).eq("id", id);
    setControls(cs=>cs.map(c=>c.id===id?{...c,...patch}:c));
    const ref = controls.find(c=>c.id===id)?.control_ref;
    logAudit("EDIT", ref, Object.keys(patch).join(", ") + " updated");
  };

  const submitControl = async (c, note="") => {
    await updateControl(c.id, {status:"Submitted", owner_note: note});
    if (note) {
      const cmt = {id:uid(),control_id:c.id,text:note,role:"assignee",created_by:user.id,created_at:new Date().toISOString()};
      await sb.from("comments").insert(cmt);
      setComments(prev=>[...prev,cmt]);
    }
    showToast(`${c.control_ref} submitted`);
  };

  const approveControl = async (c) => {
    await updateControl(c.id, {status:"Active"});
    logAudit("APPROVE", c.control_ref, "approved → Active");
    showToast(`${c.control_ref} approved`);
  };

  const returnControl = async (ctrl, comment) => {
    if (!comment.trim()) { showToast("Add a comment before returning"); return false; }
    const cmt = {id:uid(),control_id:ctrl.id,text:comment.trim(),role:"admin",created_by:user.id,created_at:new Date().toISOString()};
    await sb.from("comments").insert(cmt);
    setComments(prev=>[...prev,cmt]);
    await updateControl(ctrl.id, {status:"Reviewed — Returned"});
    logAudit("RETURN", ctrl.control_ref, comment.trim().slice(0,60));
    showToast(`${ctrl.control_ref} returned`);
    return true;
  };

  const sendReply = async (cid, text) => {
    if (!text.trim()) return;
    const cmt = {id:uid(),control_id:cid,text:text.trim(),role:isAdmin?"admin":"assignee",created_by:user.id,created_at:new Date().toISOString()};
    await sb.from("comments").insert(cmt);
    setComments(prev=>[...prev,cmt]);
    if (!isAdmin) await updateControl(cid, {status:"Submitted"});
    logAudit("REPLY", controls.find(c=>c.id===cid)?.control_ref, text.trim().slice(0,40));
    showToast("Reply sent");
  };

  /* ── FILE UPLOAD to Supabase Storage ── */
  const uploadFile = async (file, path) => {
    const {data, error} = await sb.storage.from("icfr-evidence").upload(path, file, {upsert:true});
    if (error) { showToast("Upload failed: " + error.message); return null; }
    const {data: url} = sb.storage.from("icfr-evidence").getPublicUrl(path);
    return url?.publicUrl || null;
  };

  const handleAttrEvUpload = async (e) => {
    const file=e.target.files?.[0]; if(!file||!uploadingAttr) return;
    const path = `${uploadingAttr.control_id}/${uploadingAttr.attr_id}/owner_${Date.now()}_${file.name}`;
    const url  = await uploadFile(file, path);
    const row  = {id:uid(),control_id:uploadingAttr.control_id,attr_id:uploadingAttr.attr_id,sample_id:null,file_name:file.name,file_url:url,version:"owner",uploaded_by:user.id,created_at:new Date().toISOString()};
    await sb.from("evidence").insert(row);
    setEvidence(prev=>[...prev,row]);
    showToast("Evidence uploaded"); e.target.value="";
  };

  const handleTestedUpload = async (e) => {
    const file=e.target.files?.[0]; if(!file||!testedUpload) return;
    const path = `${testedUpload.control_id}/${testedUpload.attr_id||"sample"}/tested_${Date.now()}_${file.name}`;
    const url  = await uploadFile(file, path);
    const row  = {id:uid(),control_id:testedUpload.control_id,attr_id:testedUpload.attr_id||null,sample_id:testedUpload.sample_id||null,file_name:file.name,file_url:url,version:"tested",uploaded_by:user.id,created_at:new Date().toISOString()};
    await sb.from("evidence").insert(row);
    setEvidence(prev=>[...prev,row]);
    showToast("Tested version uploaded"); e.target.value="";
  };

  const handlePopUpload = async (e) => {
    const file=e.target.files?.[0]; if(!file||!popModal) return;
    const path = `populations/${popModal.id}/${Date.now()}_${file.name}`;
    const url  = await uploadFile(file, path);
    const row  = {id:uid(),control_id:popModal.id,file_name:file.name,file_url:url,uploaded_by:user.id,created_at:new Date().toISOString()};
    await sb.from("populations").insert(row);
    setPopulations(prev=>[...prev,row]);
    showToast("Population uploaded"); e.target.value="";
  };

  const handleSampleEvUpload = async (e) => {
    const file=e.target.files?.[0]; if(!file||!uploadingAttr) return;
    const path = `${uploadingAttr.control_id}/samples/${uploadingAttr.sample_id}/${Date.now()}_${file.name}`;
    const url  = await uploadFile(file, path);
    const row  = {id:uid(),control_id:uploadingAttr.control_id,attr_id:null,sample_id:uploadingAttr.sample_id,file_name:file.name,file_url:url,version:"owner",uploaded_by:user.id,created_at:new Date().toISOString()};
    await sb.from("evidence").insert(row);
    setEvidence(prev=>[...prev,row]);
    showToast("Evidence uploaded"); e.target.value="";
  };

  const addSample = async (cid) => {
    const label=sampleInput.trim(); if(!label){showToast("Enter sample label");return;}
    const row = {id:uid(),control_id:cid,label,selected_by:user.id,created_at:new Date().toISOString()};
    await sb.from("samples").insert(row);
    setSamples(prev=>[...prev,row]);
    setSampleInput(""); showToast("Sample added");
  };

  const addAttr = async (cid) => {
    const label=attrInput.trim(); if(!label){showToast("Enter attribute text");return;}
    const existing=testAttrs.filter(a=>a.control_id===cid);
    const seq=existing.length?Math.max(...existing.map(a=>a.seq))+1:1;
    const row={id:uid(),control_id:cid,seq,label,created_at:new Date().toISOString()};
    await sb.from("test_attrs").insert(row);
    setTestAttrs(prev=>[...prev,row]);
    setAttrInput(""); showToast("Attribute added");
  };

  const removeAttr = async (attrId) => {
    await sb.from("test_attrs").delete().eq("id", attrId);
    setTestAttrs(prev=>prev.filter(a=>a.id!==attrId));
  };

  const addProcess = async () => {
    if(!newProc.name.trim()){showToast("Name required");return;}
    const row={id:uid(),name:newProc.name.trim().toUpperCase(),description:newProc.description.trim()};
    await sb.from("processes").insert(row);
    setProcesses(prev=>[...prev,row]);
    logAudit("PROCESS",row.name,"created");
    showToast(`Process ${row.name} added`);
    setNewProc({name:"",description:""});setAddProcModal(false);
  };

  const rollForward = async () => {
    if(!rollTarget.trim()){showToast("Enter period name");return;}
    if(periods.find(p=>p.id===rollTarget)){showToast("Period already exists");return;}
    // lock current
    await sb.from("periods").update({is_locked:true}).eq("id",activePeriod);
    // new period
    await sb.from("periods").insert({id:rollTarget,is_locked:false});
    // clone controls
    const src = controls.filter(c=>c.period===activePeriod);
    const cloned = src.map(c=>({...c,id:uid(),period:rollTarget,status:"Draft",is_locked:false,owner_note:"",created_at:new Date().toISOString(),updated_at:new Date().toISOString()}));
    if(cloned.length) await sb.from("controls").insert(cloned);
    setPeriods(prev=>[...prev,{id:rollTarget,is_locked:false}]);
    setControls(prev=>[...prev.map(c=>c.period===activePeriod?{...c,is_locked_period:true}:c),...cloned]);
    setActivePeriod(rollTarget);
    logAudit("ROLL-FORWARD","ALL",`${activePeriod} → ${rollTarget}`);
    showToast(`Rolled forward to ${rollTarget}`);
    setRollModal(false);setRollTarget("");
  };

  const saveException = async () => {
    if(!excDraft.description.trim()){showToast("Description required");return;}
    const row={id:uid(),control_id:excModal.control.id,...excDraft,logged_by:user.id,created_at:new Date().toISOString()};
    await sb.from("exceptions").insert(row);
    setExceptions(prev=>[...prev,row]);
    logAudit("EXCEPTION",excModal.control.control_ref,`${excDraft.type} exception`);
    showToast("Exception logged");
    setExcDraft({type:isAdmin?"test":"owner",severity:"Medium",description:"",remediation:"",target_date:""});
    setExcModal(null);
  };

  const isLocked = (period) => periods.find(p=>p.id===period)?.is_locked;

  const downloadCSV = (scope, level, procIds=null) => {
    setDownloadMenu(null); setSelectedProcs(new Set());
    const procs = scope==="current"?[processes.find(p=>p.id===activeProcess)]:processes.filter(p=>procIds?.has(p.id));
    const src   = controls.filter(c=>procs.some(p=>p&&p.id===c.process_id)&&c.period===activePeriod);
    const hdr   = ["Period","Process","#","Ref","Description","Risk","Type","Nature","Freq","Assertion","Owner","Due Date","Status"];
    if(level>1){const maxA=Math.max(0,...src.map(c=>ctrlAttrs(c.id).length));for(let i=1;i<=maxA;i++){hdr.push(`Attr ${i}`,`Attr ${i} Owner File`);if(level===3)hdr.push(`Attr ${i} Tested File`);}}
    const rows=src.map((r,i)=>{
      const base=[r.period,processes.find(p=>p.id===r.process_id)?.name,i+1,r.control_ref,r.control_description,r.risk_description,r.control_type,r.control_nature,r.frequency,r.assertion,r.control_owner,r.due_date||"",r.status];
      if(level===1) return base.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",");
      const attrs=ctrlAttrs(r.id);const maxA=Math.max(0,...src.map(c=>ctrlAttrs(c.id).length));const aData=[];
      for(let j=0;j<maxA;j++){const a=attrs[j];if(!a){aData.push("","");if(level===3)aData.push("");continue;}
        aData.push(a.label,attrEv(r.id,a.id,"owner").map(e=>e.file_name).join(";")||"—");
        if(level===3)aData.push(attrEv(r.id,a.id,"tested").map(e=>e.file_name).join(";")||"—");}
      return [...base,...aData].map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",");
    });
    const blob=new Blob([[hdr.join(","),...rows].join("\n")],{type:"text/csv"});
    Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:`RCM_${scope}_L${level}_${activePeriod.replace(" ","_")}.csv`}).click();
    showToast("Downloaded");
  };

  if (dataLoading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"monospace",fontSize:12,color:"#8a8472"}}>Loading data…</div>;

  /* ══ RENDER ══ */
  return (
    <div style={{fontFamily:"Georgia,serif",background:"#f4f2ec",minHeight:"100vh",color:"#26241e"}}
      onClick={()=>{setDownloadMenu(null);setFilterOpen(false);}}>
      <style>{`
        .mono{font-family:monospace}
        .ci{font-family:monospace;font-size:12px;width:100%;border:1px solid #b9af93;padding:3px 5px;background:#fffdf7}
        .ci:focus{outline:2px solid #3b6d11}
        table{border-collapse:collapse}
        .rcm th,.rcm td{border:1px solid #ded7c4;text-align:left;vertical-align:top}
        .rcm th{background:#2b2a23;color:#f4f2ec;font-family:monospace;font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:6px 5px;position:sticky;top:0;z-index:2;font-weight:500}
        .rcm td{padding:4px 6px;font-size:11.5px;line-height:1.35}
        .rcm tr:nth-child(even) td{background:#faf8f1}
        .ed:hover{background:#f0ecdd!important;cursor:text}
        .btn{font-family:monospace;font-size:11px;border:1px solid #26241e;background:#26241e;color:#f4f2ec;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
        .btn:hover{background:#3a3830}
        .bg{background:transparent;color:#26241e}.bg:hover{background:#e7e2d4}
        .sm{padding:3px 7px;font-size:10px}
        textarea{width:100%;font-size:12px;border:1px solid #c8bfa6;padding:7px;background:#fffdf7;font-family:inherit;resize:vertical}
        textarea:focus{outline:2px solid #3b6d11}
        .overlay{position:fixed;inset:0;background:rgba(38,36,30,.5);display:flex;align-items:center;justify-content:center;z-index:80}
        .modal{background:#f4f2ec;max-width:580px;width:92vw;border:1px solid #26241e;box-shadow:6px 6px 0 rgba(38,36,30,.18);max-height:90vh;overflow-y:auto}
        .mhdr{background:#26241e;color:#f4f2ec;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;position:sticky;top:0;z-index:1}
        .mbody{padding:14px}
        input[type=text],input[type=date]{font-family:monospace;font-size:12px;border:1px solid #c8bfa6;padding:4px 7px;background:#fffdf7}
        input[type=text]:focus,input[type=date]:focus{outline:2px solid #3b6d11}
        select.fsel{font-family:monospace;font-size:11px;border:1px solid #c8bfa6;padding:4px 6px;background:#fffdf7}
        .pcard{background:#fffdf7;border:1px solid #ded7c4;padding:16px;cursor:pointer;transition:box-shadow .15s;position:relative}
        .pcard:hover{box-shadow:3px 3px 0 rgba(38,36,30,.12)}
        .dditem{display:block;width:100%;text-align:left;padding:7px 12px;border:none;background:transparent;font-size:12px;cursor:pointer;font-family:monospace;border-bottom:1px solid #f0ecdd}
        .dditem:hover{background:#f0ecdd}
        .navbtn{padding:8px 15px;border:none;cursor:pointer;font-family:monospace;font-size:11px;display:flex;align-items:center;gap:5px;background:transparent;color:#f4f2ec;opacity:.65;border-bottom:2px solid transparent}
        .navbtn.active{opacity:1;border-bottom:2px solid #3b6d11}
        .navbtn:hover{opacity:1}
        .lbl{font-family:monospace;font-size:9px;letter-spacing:.06em;color:#8a8472;text-transform:uppercase;margin-bottom:4px}
      `}</style>

      {/* HEADER */}
      <header style={{background:"#26241e",color:"#f4f2ec",padding:"0 18px",display:"flex",alignItems:"stretch",justifyContent:"space-between",borderBottom:"3px solid #3b6d11",height:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16,fontWeight:600}}>ICFR Control Repository</span>
          <div style={{display:"flex",marginLeft:12}}>
            {[["dashboard","Dashboard"],["rcm","RCM"]].map(([p,lbl])=>(
              <button key={p} className={`navbtn${page===p?" active":""}`} onClick={()=>setPage(p)}>{lbl}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <select value={activePeriod} onChange={e=>setActivePeriod(e.target.value)}
            style={{fontFamily:"monospace",fontSize:11,background:"transparent",color:"#f4f2ec",border:"1px solid #4a4840",padding:"3px 6px"}}>
            {periods.map(p=><option key={p.id} value={p.id} style={{background:"#26241e"}}>{p.id}{p.is_locked?" 🔒":""}</option>)}
          </select>
          {isAdmin&&<button className="btn sm" style={{background:"#3b6d11",borderColor:"#3b6d11"}} onClick={()=>setRollModal(true)}>Roll Forward</button>}
          <span style={{fontFamily:"monospace",fontSize:10,opacity:.55}}>{profile?.full_name||user.email}</span>
          <span style={{fontFamily:"monospace",fontSize:9,background:isAdmin?"#3b6d11":"#185fa5",padding:"2px 7px",borderRadius:3}}>{isAdmin?"ADMIN":"ASSIGNEE"}</span>
          <button className="btn bg sm" onClick={onSignOut}>Sign Out</button>
        </div>
      </header>

      {/* DASHBOARD */}
      {page==="dashboard"&&(
        <div style={{padding:"20px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div>
              <h2 style={{margin:0,fontSize:21,fontWeight:600}}>Dashboard <span style={{color:"#a59d86",fontWeight:400,fontSize:16}}>· {activePeriod}</span></h2>
              <div style={{fontFamily:"monospace",fontSize:10,color:"#8a8472",marginTop:2}}>{processes.length} PROCESSES · {controls.filter(c=>c.period===activePeriod).length} CONTROLS</div>
            </div>
            {isAdmin&&<button className="btn" onClick={()=>setAddProcModal(true)}>+ Add Process</button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:20}}>
            {[
              ["Total",controls.filter(c=>c.period===activePeriod).length,"#26241e"],
              ["Signed Off",controls.filter(c=>c.period===activePeriod&&c.status==="Signed Off").length,"#27500a"],
              ["In Progress",controls.filter(c=>c.period===activePeriod&&["Active","Under Testing","Tested"].includes(c.status)).length,"#185fa5"],
              ["Overdue",controls.filter(c=>c.period===activePeriod&&isOverdue(c)).length,"#a32d2d"],
            ].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:"#fffdf7",border:"1px solid #ded7c4",padding:"10px 12px"}}>
                <div style={{fontFamily:"monospace",fontSize:9,color:"#8a8472",textTransform:"uppercase",marginBottom:4}}>{lbl}</div>
                <div style={{fontSize:24,fontWeight:600,color:col,fontFamily:"monospace"}}>{val}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
            {processes.map(p=>{
              const st=procStats(p.id);
              return (
                <div key={p.id} className="pcard" onClick={()=>{setActiveProcess(p.id);setPage("rcm");}}>
                  {(st.overdueCount>0||st.returnedCount>0)&&(
                    <div style={{position:"absolute",top:10,right:10,display:"flex",gap:4}}>
                      {st.overdueCount>0&&<span style={{background:"#fcebeb",border:"1px solid #f09595",color:"#a32d2d",fontFamily:"monospace",fontSize:9,padding:"2px 6px",borderRadius:3}}>⚠ {st.overdueCount}</span>}
                      {st.returnedCount>0&&<span style={{background:"#faeeda",border:"1px solid #ef9f27",color:"#854f0b",fontFamily:"monospace",fontSize:9,padding:"2px 6px",borderRadius:3}}>↩ {st.returnedCount}</span>}
                    </div>
                  )}
                  <div style={{fontSize:17,fontWeight:600,marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#8a8472",marginBottom:10}}>{p.description}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:10}}>
                    {STATUSES.map(s=>st.byStatus[s]>0&&<Badge key={s} status={s} small/>).filter(Boolean)}
                    {st.total===0&&<span style={{fontSize:11,color:"#a59d86",fontStyle:"italic"}}>No controls yet</span>}
                  </div>
                  {[
                    [st.completionPct,"Completion",`${st.signedOff}/${st.total}`,"#27500a","#eaf3de"],
                    [st.evidencePct,"Evidence",`${st.evidenceDone}/${st.totalAttrs}`,"#185fa5","#e6f1fb"],
                    ...(isAdmin?[[st.testedPct,"Testing",`${st.testedDone}/${st.totalAttrs}`,"#854f0b","#faeeda"]]:[]),
                  ].map(([pct,lbl,frac,col,bg])=>(
                    <div key={lbl} style={{marginBottom:5}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:"monospace",marginBottom:2}}>
                        <span style={{color:"#5f5e5a"}}>{lbl}</span>
                        <span style={{fontWeight:500}}>{pct}% <span style={{color:"#a59d86",fontWeight:400}}>({frac})</span></span>
                      </div>
                      <ProgressBar value={pct} color={col} bg={bg}/>
                    </div>
                  ))}
                  <div style={{marginTop:8,fontFamily:"monospace",fontSize:10,color:"#3b6d11"}}>→ Open RCM</div>
                </div>
              );
            })}
            {isAdmin&&<div onClick={()=>setAddProcModal(true)} style={{border:"2px dashed #c8bfa6",padding:"16px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:7,minHeight:160,color:"#a59d86"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#8a8472";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#c8bfa6";}}>
              <span style={{fontSize:24}}>+</span><div style={{fontFamily:"monospace",fontSize:11}}>Add Process</div>
            </div>}
          </div>
        </div>
      )}

      {/* RCM */}
      {page==="rcm"&&(
        <div style={{display:"flex",minHeight:"calc(100vh - 50px)"}}>
          <aside style={{width:sidebarOpen?200:34,background:"#ece8dc",borderRight:"1px solid #ded7c4",padding:"14px 0",flexShrink:0,transition:"width .2s",overflow:"hidden",position:"relative",whiteSpace:"nowrap"}}>
            <button onClick={()=>setSidebarOpen(o=>!o)} style={{position:"absolute",top:10,right:5,border:"1px solid #c8bfa6",background:"transparent",cursor:"pointer",padding:"2px 3px",borderRadius:3,display:"flex",alignItems:"center",zIndex:1}}>
              {sidebarOpen?"✕":"›"}
            </button>
            <div style={{opacity:sidebarOpen?1:0,pointerEvents:sidebarOpen?"auto":"none",transition:"opacity .15s"}}>
              <div style={{fontFamily:"monospace",fontSize:9,color:"#8a8472",padding:"0 14px 7px",textTransform:"uppercase",letterSpacing:".08em"}}>Processes</div>
              {processes.map(p=>{
                const cnt=controls.filter(c=>c.process_id===p.id&&c.period===activePeriod).length;
                const ov=controls.filter(c=>c.process_id===p.id&&c.period===activePeriod&&isOverdue(c)).length;
                const on=activeProcess===p.id;
                return <button key={p.id} onClick={()=>setActiveProcess(p.id)}
                  style={{width:"100%",textAlign:"left",padding:"9px 14px",border:"none",borderLeft:on?"3px solid #3b6d11":"3px solid transparent",background:on?"#f4f2ec":"transparent",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{p.name}{ov>0&&<span style={{fontSize:8,background:"#a32d2d",color:"#fff",padding:"1px 4px",borderRadius:8,marginLeft:4}}>!</span>}</div>
                    <div style={{fontFamily:"monospace",fontSize:9,color:"#8a8472",whiteSpace:"normal"}}>{p.description}</div>
                  </div>
                  <span style={{fontFamily:"monospace",fontSize:10,color:"#8a8472"}}>{cnt}</span>
                </button>;
              })}
              {isAdmin&&<button className="btn bg sm" style={{margin:"10px 14px 0",fontSize:10}} onClick={()=>setAddProcModal(true)}>+ Add</button>}
            </div>
          </aside>

          <main style={{flex:1,padding:"16px 18px",overflow:"auto"}}>
            {/* Toolbar */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,gap:6,flexWrap:"wrap"}}>
              <h2 style={{margin:0,fontSize:20,fontWeight:600}}>
                {processes.find(p=>p.id===activeProcess)?.name} · RCM
                {isLocked(activePeriod)&&<span style={{fontSize:11,color:"#a32d2d",marginLeft:8,fontFamily:"monospace"}}>🔒 locked</span>}
              </h2>
              <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                {isAdmin&&selectedIds.size>0&&<button className="btn" style={{background:"#185fa5",borderColor:"#185fa5"}} onClick={()=>setEmailModal(true)}>✉ Email ({selectedIds.size})</button>}
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{fontFamily:"monospace",fontSize:11,padding:"5px 8px",border:"1px solid #c8bfa6",background:"#fffdf7",width:130}}/>
                <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
                  <button className="btn bg" onClick={()=>setFilterOpen(f=>!f)}>Filter {(filters.status||filters.type||filters.overdue)&&"●"}</button>
                  {filterOpen&&<div style={{position:"absolute",top:"100%",left:0,marginTop:2,background:"#fffdf7",border:"1px solid #c8bfa6",zIndex:20,minWidth:210,padding:10,boxShadow:"3px 3px 0 rgba(38,36,30,.1)"}}>
                    <div className="lbl">Status</div>
                    <select className="fsel" value={filters.status} onChange={e=>setFilters(f=>({...f,status:e.target.value}))} style={{width:"100%",marginBottom:8}}><option value="">All</option>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>
                    <div className="lbl">Type</div>
                    <select className="fsel" value={filters.type} onChange={e=>setFilters(f=>({...f,type:e.target.value}))} style={{width:"100%",marginBottom:8}}><option value="">All</option><option>Preventive</option><option>Detective</option></select>
                    <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,cursor:"pointer",marginBottom:8}}><input type="checkbox" checked={filters.overdue} onChange={e=>setFilters(f=>({...f,overdue:e.target.checked}))}/>Overdue only</label>
                    <button className="btn bg sm" style={{width:"100%",justifyContent:"center"}} onClick={()=>setFilters({status:"",type:"",overdue:false})}>Clear</button>
                  </div>}
                </div>
                {[["current",processes.find(p=>p.id===activeProcess)?.name||""],["multi","Select Processes"]].map(([scope,lbl])=>(
                  <div key={scope} style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
                    <button className="btn bg" onClick={()=>setDownloadMenu(downloadMenu===scope?null:scope)}>↓ {lbl} ▾</button>
                    {downloadMenu===scope&&<div style={{position:"absolute",top:"100%",right:0,marginTop:2,background:"#fffdf7",border:"1px solid #c8bfa6",zIndex:20,minWidth:240,boxShadow:"3px 3px 0 rgba(38,36,30,.1)"}}>
                      {scope==="multi"&&<div style={{padding:"8px 10px",borderBottom:"1px solid #ded7c4"}}>
                        {processes.map(p=><label key={p.id} style={{display:"flex",alignItems:"center",gap:7,padding:"3px 0",cursor:"pointer",fontSize:12}}>
                          <input type="checkbox" checked={selectedProcs.has(p.id)} onChange={e=>{const s=new Set(selectedProcs);e.target.checked?s.add(p.id):s.delete(p.id);setSelectedProcs(s);}}/>
                          <span style={{fontFamily:"monospace",color:"#1d9e75",minWidth:30}}>{p.name}</span><span style={{color:"#8a8472",fontSize:11}}>{p.description}</span>
                        </label>)}
                        <label style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0 0",cursor:"pointer",fontSize:11,borderTop:"1px solid #f0ecdd",marginTop:3,fontFamily:"monospace"}}>
                          <input type="checkbox" checked={selectedProcs.size===processes.length} onChange={e=>setSelectedProcs(e.target.checked?new Set(processes.map(p=>p.id)):new Set())}/>Select all
                        </label>
                      </div>}
                      <div style={{opacity:scope==="multi"&&selectedProcs.size===0?.4:1,pointerEvents:scope==="multi"&&selectedProcs.size===0?"none":"auto"}}>
                        {[[1,"RCM only"],[2,"RCM + submissions"],[3,"RCM + submissions + test data"]].map(([lvl,lbl])=>(
                          <button key={lvl} className="dditem" onClick={()=>downloadCSV(scope,lvl,selectedProcs)}>{lvl}. {lbl}</button>
                        ))}
                      </div>
                    </div>}
                  </div>
                ))}
                {isAdmin&&!isLocked(activePeriod)&&<>
                  <button className="btn bg sm" onClick={()=>xlsRef.current?.click()}>↑ Excel</button>
                  <button className="btn sm" onClick={async()=>{
                    const proc=processes.find(p=>p.id===activeProcess);
                    const cnt=controls.filter(c=>c.process_id===activeProcess&&c.period===activePeriod).length+1;
                    const row={id:uid(),process_id:activeProcess,period:activePeriod,control_ref:`${proc.name}-C${String(cnt).padStart(2,"0")}`,
                      control_description:"",risk_description:"",control_type:"Preventive",control_nature:"Manual",
                      frequency:"Monthly",assertion:"",control_owner:"",owner_name:"",owner_email:"",status:"Draft",is_locked:false,needs_population:false,due_date:null,owner_note:""};
                    await sb.from("controls").insert(row);
                    setControls(cs=>[...cs,row]);showToast("Control added");
                  }}>+ Add</button>
                  <input ref={xlsRef} type="file" accept=".xlsx,.xls,.csv" onChange={e=>{showToast(`"${e.target.files[0]?.name}" — wire SheetJS for live parse`);e.target.value="";}} style={{display:"none"}}/>
                </>}
              </div>
            </div>

            {/* TABLE */}
            <div style={{overflow:"auto",border:"1px solid #ded7c4",background:"#fffdf7",maxHeight:"62vh"}}>
              <table className="rcm" style={{minWidth:1500}}>
                <thead>
                  <tr>
                    {isAdmin&&<th style={{width:30,textAlign:"center"}}><input type="checkbox" checked={visible.length>0&&visible.every(r=>selectedIds.has(r.id))} onChange={e=>setSelectedIds(e.target.checked?new Set(visible.map(r=>r.id)):new Set())}/></th>}
                    <th style={{width:32,textAlign:"center"}}>#</th>
                    {COLS.map(c=><th key={c.key} style={{minWidth:c.w}} onClick={()=>{if(sortKey===c.key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(c.key);setSortDir("asc");}}}>{c.label}{sortKey===c.key?(sortDir==="asc"?" ↑":" ↓"):" ⇅"}</th>)}
                    {isAdmin&&<th style={{minWidth:120}}>Owner Name</th>}
                    {isAdmin&&<th style={{minWidth:145}}>Owner Email</th>}
                    <th style={{minWidth:88}}>Due Date</th>
                    <th style={{minWidth:150}}>Testing Attributes</th>
                    <th style={{minWidth:50}}>Pop?</th>
                    <th style={{minWidth:125}}>Status</th>
                    <th style={{minWidth:120}}>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((row,idx)=>{
                    const cmts=ctrlCmts(row.id);
                    const attrs=ctrlAttrs(row.id);
                    const canEdit=isAdmin&&!row.is_locked&&!isLocked(activePeriod);
                    const overdue=isOverdue(row);
                    const excs=ctrlExc(row.id);
                    return <tr key={row.id} style={{opacity:row.is_locked?.85:1,background:overdue?"#fff8f8":""}}>
                      {isAdmin&&<td style={{textAlign:"center",padding:"3px 2px"}}><input type="checkbox" checked={selectedIds.has(row.id)} onChange={e=>{const s=new Set(selectedIds);e.target.checked?s.add(row.id):s.delete(row.id);setSelectedIds(s);}}/></td>}
                      <td style={{textAlign:"center",fontFamily:"monospace",fontSize:10,color:"#8a8472"}}>{idx+1}</td>
                      {COLS.map(col=>{
                        const editing=editingCell?.id===row.id&&editingCell?.key===col.key;
                        return <td key={col.key} className={canEdit?"ed":""} onClick={()=>canEdit&&setEditingCell({id:row.id,key:col.key})}>
                          {editing?<input autoFocus className="ci" defaultValue={row[col.key]} onBlur={e=>{updateControl(row.id,{[col.key]:e.target.value});setEditingCell(null);}} onKeyDown={e=>{if(e.key==="Enter"){updateControl(row.id,{[col.key]:e.target.value});setEditingCell(null);}if(e.key==="Escape")setEditingCell(null);}}/>
                            :<span style={col.key==="control_ref"?{fontFamily:"monospace",fontWeight:500,color:"#1d9e75"}:{}}>{row[col.key]||<span style={{color:"#c8bfa6"}}>—</span>}</span>}
                        </td>;
                      })}
                      {isAdmin&&<td className="ed" onClick={()=>setEditingCell({id:row.id,key:"owner_name"})}>
                        {editingCell?.id===row.id&&editingCell?.key==="owner_name"?<input autoFocus className="ci" defaultValue={row.owner_name||""} onBlur={e=>{updateControl(row.id,{owner_name:e.target.value});setEditingCell(null);}} onKeyDown={e=>{if(e.key==="Enter"){updateControl(row.id,{owner_name:e.target.value});setEditingCell(null);}if(e.key==="Escape")setEditingCell(null);}}/>
                          :<span style={{fontSize:11}}>{row.owner_name||<span style={{color:"#c8bfa6"}}>—</span>}</span>}
                      </td>}
                      {isAdmin&&<td className="ed" onClick={()=>setEditingCell({id:row.id,key:"owner_email"})}>
                        {editingCell?.id===row.id&&editingCell?.key==="owner_email"?<input autoFocus className="ci" defaultValue={row.owner_email||""} onBlur={e=>{updateControl(row.id,{owner_email:e.target.value});setEditingCell(null);}} onKeyDown={e=>{if(e.key==="Enter"){updateControl(row.id,{owner_email:e.target.value});setEditingCell(null);}if(e.key==="Escape")setEditingCell(null);}}/>
                          :<span style={{fontFamily:"monospace",fontSize:10,color:"#185fa5"}}>{row.owner_email||<span style={{color:"#c8bfa6"}}>—</span>}</span>}
                      </td>}
                      <td className={canEdit?"ed":""} onClick={()=>canEdit&&setEditingCell({id:row.id,key:"due_date"})}>
                        {editingCell?.id===row.id&&editingCell?.key==="due_date"?<input type="date" autoFocus className="ci" defaultValue={row.due_date||""} onBlur={e=>{updateControl(row.id,{due_date:e.target.value});setEditingCell(null);}} onKeyDown={e=>{if(e.key==="Enter"){updateControl(row.id,{due_date:e.target.value});setEditingCell(null);}if(e.key==="Escape")setEditingCell(null);}}/>
                          :<span style={{fontFamily:"monospace",fontSize:10,color:overdue?"#a32d2d":"#26241e",fontWeight:overdue?600:400}}>{overdue&&"⚠ "}{fmt(row.due_date)}</span>}
                      </td>
                      <td style={{cursor:"pointer"}} onClick={()=>setAttrModal(row)}>
                        {attrs.length===0?<span style={{color:"#c8bfa6",fontSize:11,fontStyle:"italic"}}>{isAdmin?"+ define":"—"}</span>
                          :<div style={{display:"flex",flexDirection:"column",gap:2}}>{attrs.map(a=>{
                            const ec=attrEv(row.id,a.id,"owner").length,tc=attrEv(row.id,a.id,"tested").length;
                            return <div key={a.id} style={{fontSize:10,display:"flex",alignItems:"center",gap:3}}>
                              <span style={{fontFamily:"monospace",color:"#1d9e75",minWidth:13}}>{a.seq}.</span>
                              <span style={{flex:1}}>{a.label.length>24?a.label.slice(0,24)+"…":a.label}</span>
                              {ec>0&&<span style={{background:"#eaf3de",color:"#3b6d11",fontSize:8,padding:"1px 3px",borderRadius:3}}>📎{ec}</span>}
                              {isAdmin&&tc>0&&<span style={{background:"#faeeda",color:"#854f0b",fontSize:8,padding:"1px 3px",borderRadius:3}}>✓{tc}</span>}
                            </div>;
                          })}</div>}
                      </td>
                      <td style={{textAlign:"center"}}>
                        {isAdmin?<input type="checkbox" checked={!!row.needs_population} onChange={()=>updateControl(row.id,{needs_population:!row.needs_population})}/>
                          :row.needs_population?<span>🗄</span>:<span style={{color:"#c8bfa6"}}>—</span>}
                      </td>
                      <td>
                        {isAdmin&&!row.is_locked&&!isLocked(activePeriod)?
                          <select value={row.status} onChange={e=>updateControl(row.id,{status:e.target.value})} style={{fontFamily:"monospace",fontSize:10,border:`1px solid ${S_COLOR[row.status]?.border||"#ccc"}`,padding:"2px 3px",background:S_COLOR[row.status]?.bg,color:S_COLOR[row.status]?.fg,width:"100%"}}>
                            {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                          </select>
                          :<div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <Badge status={row.status}/>
                            {cmts.length>0&&<span onClick={()=>{setThreadModal(row);setCommentDraft("");}} style={{fontFamily:"monospace",fontSize:9,color:"#185fa5",cursor:"pointer",textDecoration:"underline"}}>💬 {cmts.length}</span>}
                            {excs.length>0&&<span onClick={()=>setExcModal({control:row,mode:"view"})} style={{fontFamily:"monospace",fontSize:9,color:"#a32d2d",cursor:"pointer",textDecoration:"underline"}}>🚩 {excs.length}</span>}
                          </div>}
                      </td>
                      <td>
                        <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
                          {row.needs_population&&<button className="btn bg sm" style={{color:"#185fa5"}} onClick={()=>setPopModal(row)}>Pop</button>}
                          {isAdmin&&row.status==="Submitted"&&<button className="btn sm" style={{background:"#854f0b",borderColor:"#854f0b"}} onClick={()=>{setReviewModal(row);setCommentDraft("");}}>Review</button>}
                          {!isAdmin&&(row.status==="Draft"||row.status==="Reviewed — Returned")&&<button className="btn sm" style={{background:"#185fa5",borderColor:"#185fa5"}} onClick={()=>setThreadModal(row)}>Submit</button>}
                          <button className="btn bg sm" style={{color:"#a32d2d"}} onClick={()=>setExcModal({control:row,mode:"add"})}>🚩</button>
                          {isAdmin&&<button className="btn bg sm" onClick={()=>updateControl(row.id,{is_locked:!row.is_locked})}>{row.is_locked?"🔓":"🔒"}</button>}
                          {isAdmin&&!row.is_locked&&!isLocked(activePeriod)&&<button className="btn bg sm" style={{color:"#a32d2d"}} onClick={async()=>{await sb.from("controls").delete().eq("id",row.id);setControls(cs=>cs.filter(x=>x.id!==row.id));showToast("Deleted");}}>🗑</button>}
                        </div>
                      </td>
                    </tr>;
                  })}
                  {visible.length===0&&<tr><td colSpan={22} style={{textAlign:"center",padding:24,color:"#a59d86"}}>No controls.</td></tr>}
                </tbody>
              </table>
            </div>
          </main>
        </div>
      )}

      {/* ══ MODALS ══ */}

      {/* Roll Forward */}
      {rollModal&&<div className="overlay" onClick={()=>setRollModal(false)}><div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>Roll Forward Period</span><span style={{cursor:"pointer"}} onClick={()=>setRollModal(false)}>✕</span></div>
        <div className="mbody">
          <div style={{fontSize:13,color:"#56503f",marginBottom:12}}>Locks <strong>{activePeriod}</strong> and clones all controls into the new period with status reset to Draft.</div>
          <div className="lbl">New Period Name</div>
          <input type="text" value={rollTarget} onChange={e=>setRollTarget(e.target.value)} placeholder="e.g. Feb 2026" style={{width:"100%",marginBottom:12}}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn bg" onClick={()=>setRollModal(false)}>Cancel</button>
            <button className="btn" style={{background:"#3b6d11",borderColor:"#3b6d11"}} onClick={rollForward}>Roll Forward</button>
          </div>
        </div>
      </div></div>}

      {/* Add Process */}
      {addProcModal&&<div className="overlay" onClick={()=>setAddProcModal(false)}><div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>Add Process</span><span style={{cursor:"pointer"}} onClick={()=>setAddProcModal(false)}>✕</span></div>
        <div className="mbody">
          <div className="lbl">Short Code</div>
          <input type="text" value={newProc.name} onChange={e=>setNewProc(p=>({...p,name:e.target.value}))} placeholder="e.g. O2C" style={{width:"100%",marginBottom:10}}/>
          <div className="lbl">Description</div>
          <input type="text" value={newProc.description} onChange={e=>setNewProc(p=>({...p,description:e.target.value}))} placeholder="e.g. Order to Cash" style={{width:"100%",marginBottom:12}}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn bg" onClick={()=>setAddProcModal(false)}>Cancel</button>
            <button className="btn" onClick={addProcess}>+ Create</button>
          </div>
        </div>
      </div></div>}

      {/* Thread */}
      {threadModal&&<div className="overlay" onClick={()=>{setThreadModal(null);setCommentDraft("");}}><div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>Messages · {threadModal.control_ref}</span><span style={{cursor:"pointer"}} onClick={()=>{setThreadModal(null);setCommentDraft("");}}>✕</span></div>
        <div className="mbody">
          <p style={{fontSize:12,color:"#56503f",marginTop:0,marginBottom:12}}>{threadModal.control_description}</p>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14,maxHeight:260,overflowY:"auto"}}>
            {ctrlCmts(threadModal.id).length===0&&<div style={{fontSize:12,color:"#a59d86",fontStyle:"italic"}}>No messages yet.</div>}
            {ctrlCmts(threadModal.id).map(c=>{
              const mine=(c.role==="admin")===isAdmin;
              return <div key={c.id} style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"80%",padding:"8px 11px",borderRadius:4,fontSize:12,lineHeight:1.5,background:c.role==="admin"?"#e6f1fb":"#eaf3de",border:`1px solid ${c.role==="admin"?"#b5d4f4":"#97c459"}`,color:c.role==="admin"?"#185fa5":"#27500a"}}>{c.text}</div>
                <div style={{fontFamily:"monospace",fontSize:9,color:"#a59d86",marginTop:2}}>{c.role==="admin"?"Admin":"Owner"} · {new Date(c.created_at).toLocaleString()}</div>
              </div>;
            })}
          </div>
          <div className="lbl">{isAdmin?"Comment":"Reply / Notes"}</div>
          <textarea rows={3} value={commentDraft} onChange={e=>setCommentDraft(e.target.value)} placeholder={isAdmin?"Add a comment…":"Explain what you've submitted…"}/>
          <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:8}}>
            {!isAdmin&&<button className="btn" style={{background:"#185fa5",borderColor:"#185fa5"}} onClick={()=>{submitControl(threadModal,commentDraft);setThreadModal(null);setCommentDraft("");}}>↑ Submit</button>}
            {isAdmin&&<>
              <button className="btn bg" onClick={()=>{sendReply(threadModal.id,commentDraft);setCommentDraft("");}}>Reply</button>
              <button className="btn" style={{background:"#a32d2d",borderColor:"#a32d2d"}} onClick={async()=>{const ok=await returnControl(threadModal,commentDraft);if(ok){setCommentDraft("");setThreadModal(null);}}}>↩ Return</button>
              <button className="btn" style={{background:"#27500a",borderColor:"#27500a"}} onClick={()=>{approveControl(threadModal);setThreadModal(null);setCommentDraft("");}}>✓ Approve</button>
            </>}
          </div>
        </div>
      </div></div>}

      {/* Review shortcut */}
      {reviewModal&&<div className="overlay" onClick={()=>setReviewModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>Review: {reviewModal.control_ref}</span><span style={{cursor:"pointer"}} onClick={()=>setReviewModal(null)}>✕</span></div>
        <div className="mbody">
          <p style={{fontSize:12,color:"#56503f",marginTop:0}}>{reviewModal.control_description}</p>
          {reviewModal.owner_note&&<div style={{padding:"8px 10px",background:"#eaf3de",border:"1px solid #97c459",fontSize:12,marginBottom:12,borderRadius:3}}><div className="lbl" style={{color:"#3b6d11"}}>Owner Note</div>{reviewModal.owner_note}</div>}
          <div className="lbl">Return Comment</div>
          <textarea rows={3} value={commentDraft} onChange={e=>setCommentDraft(e.target.value)} placeholder="What is missing…"/>
          <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:10}}>
            <button className="btn bg" onClick={()=>setReviewModal(null)}>Cancel</button>
            <button className="btn" style={{background:"#a32d2d",borderColor:"#a32d2d"}} onClick={async()=>{const ok=await returnControl(reviewModal,commentDraft);if(ok){setCommentDraft("");setReviewModal(null);}}}>↩ Return</button>
            <button className="btn" style={{background:"#27500a",borderColor:"#27500a"}} onClick={()=>{approveControl(reviewModal);setReviewModal(null);}}>✓ Approve</button>
          </div>
        </div>
      </div></div>}

      {/* Testing Attributes */}
      {attrModal&&<div className="overlay" onClick={()=>setAttrModal(null)}><div className="modal" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>Testing Attributes · {attrModal.control_ref}</span><span style={{cursor:"pointer"}} onClick={()=>setAttrModal(null)}>✕</span></div>
        <div className="mbody">
          <p style={{fontSize:12,color:"#56503f",marginTop:0,marginBottom:12}}>{attrModal.control_description}</p>
          {ctrlAttrs(attrModal.id).map(a=>{
            const ownerEvs=attrEv(attrModal.id,a.id,"owner"),testedEvs=attrEv(attrModal.id,a.id,"tested");
            return <div key={a.id} style={{marginBottom:9,border:"1px solid #ded7c4",background:"#fffdf7"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:7,padding:"7px 10px",borderBottom:"1px solid #ded7c4",background:"#f4f2ec"}}>
                <span style={{fontFamily:"monospace",fontSize:12,fontWeight:500,color:"#1d9e75",minWidth:18}}>{a.seq}.</span>
                <span style={{flex:1,fontSize:12}}>{a.label}</span>
                {isAdmin&&<button onClick={()=>removeAttr(a.id)} style={{border:"none",background:"transparent",cursor:"pointer",color:"#a32d2d"}}>🗑</button>}
              </div>
              <div style={{padding:"7px 10px",display:"flex",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:140}}>
                  <div className="lbl">Owner Version</div>
                  {ownerEvs.length===0?<div style={{fontSize:11,color:"#a59d86",fontStyle:"italic",marginBottom:4}}>No file.</div>
                    :ownerEvs.map(ev=><div key={ev.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 0"}}>
                      📎 <a href={ev.file_url} target="_blank" style={{flex:1,color:"#185fa5"}}>{ev.file_name}</a>
                    </div>)}
                  {!isAdmin&&<button className="btn bg sm" style={{marginTop:4}} onClick={()=>{setUploadingAttr({control_id:attrModal.id,attr_id:a.id});attrEvRef.current?.click();}}>↑ Upload</button>}
                </div>
                {isAdmin&&<div style={{flex:1,minWidth:140}}>
                  <div className="lbl" style={{color:"#854f0b"}}>Tested Version</div>
                  {testedEvs.length===0?<div style={{fontSize:11,color:"#a59d86",fontStyle:"italic",marginBottom:4}}>Not uploaded.</div>
                    :testedEvs.map(ev=><div key={ev.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 0"}}>
                      ✅ <a href={ev.file_url} target="_blank" style={{flex:1,color:"#854f0b"}}>{ev.file_name}</a>
                    </div>)}
                  <button className="btn bg sm" style={{marginTop:4}} onClick={()=>{setTestedUpload({control_id:attrModal.id,attr_id:a.id});testedEvRef.current?.click();}}>↑ Upload Tested</button>
                </div>}
              </div>
            </div>;
          })}
          {isAdmin&&<div style={{marginTop:8,paddingTop:10,borderTop:"1px solid #ded7c4"}}>
            <div className="lbl">Add Attribute</div>
            <div style={{display:"flex",gap:5}}>
              <input type="text" value={attrInput} onChange={e=>setAttrInput(e.target.value)} placeholder={`${ctrlAttrs(attrModal.id).length+1}. Testing step…`} onKeyDown={e=>e.key==="Enter"&&addAttr(attrModal.id)} style={{flex:1}}/>
              <button className="btn sm" onClick={()=>addAttr(attrModal.id)}>+ Add</button>
            </div>
          </div>}
        </div>
      </div></div>}
      <input ref={attrEvRef} type="file" onChange={handleAttrEvUpload} style={{display:"none"}}/>
      <input ref={testedEvRef} type="file" onChange={handleTestedUpload} style={{display:"none"}}/>

      {/* Population */}
      {popModal&&<div className="overlay" onClick={()=>setPopModal(null)}><div className="modal" style={{maxWidth:580}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>Population · {popModal.control_ref}</span><span style={{cursor:"pointer"}} onClick={()=>setPopModal(null)}>✕</span></div>
        <div className="mbody">
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}><span style={{background:"#26241e",color:"#f4f2ec",fontSize:9,padding:"2px 6px",borderRadius:3,fontFamily:"monospace"}}>STEP 1</span><strong>Population</strong></div>
            {popForCtrl(popModal.id).length===0?(!isAdmin?<div><div style={{fontSize:12,marginBottom:7}}>Upload the full population file.</div><button className="btn sm" onClick={()=>popFileRef.current?.click()}>↑ Upload</button><input ref={popFileRef} type="file" onChange={handlePopUpload} style={{display:"none"}}/></div>:<div style={{fontSize:12,color:"#a59d86",fontStyle:"italic"}}>Awaiting upload.</div>)
              :popForCtrl(popModal.id).map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"#eaf3de",border:"1px solid #97c459",fontSize:12,marginBottom:3}}><span>📊</span><a href={p.file_url} target="_blank" style={{flex:1,color:"#3b6d11"}}>{p.file_name}</a>✓</div>)}
          </div>
          <div style={{opacity:popForCtrl(popModal.id).length===0?.4:1}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}><span style={{background:"#185fa5",color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:3,fontFamily:"monospace"}}>STEP 2</span><strong>Samples</strong>{!isAdmin&&<span style={{fontFamily:"monospace",fontSize:10,color:"#8a8472"}}>(admin selects)</span>}</div>
            {ctrlSamples(popModal.id).map(s=>{
              const evs=sampleEv(s.id,"owner");
              return <div key={s.id} style={{marginBottom:5,border:"1px solid #ded7c4",background:"#fffdf7"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,padding:"5px 9px",background:"#e6f1fb",borderBottom:"1px solid #b5d4f4"}}><span style={{fontFamily:"monospace",flex:1,color:"#185fa5",fontWeight:500,fontSize:12}}>{s.label}</span></div>
                {!isAdmin&&<div style={{padding:"5px 9px"}}>
                  {evs.map(ev=><div key={ev.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,padding:"2px 0"}}>📎 <a href={ev.file_url} target="_blank" style={{color:"#185fa5"}}>{ev.file_name}</a></div>)}
                  <button className="btn bg sm" style={{marginTop:3}} onClick={()=>{setUploadingAttr({control_id:popModal.id,sample_id:s.id});evFileRef.current?.click();}}>↑ Upload Evidence</button>
                </div>}
              </div>;
            })}
            {ctrlSamples(popModal.id).length===0&&<div style={{fontSize:12,color:"#a59d86",fontStyle:"italic"}}>No samples yet.</div>}
            {isAdmin&&popForCtrl(popModal.id).length>0&&<div style={{display:"flex",gap:5,marginTop:7}}>
              <input type="text" placeholder="Sample label e.g. TXN-0042" value={sampleInput} onChange={e=>setSampleInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSample(popModal.id)} style={{flex:1}}/>
              <button className="btn sm" onClick={()=>addSample(popModal.id)}>+ Add</button>
            </div>}
          </div>
        </div>
      </div></div>}
      <input ref={evFileRef} type="file" onChange={handleSampleEvUpload} style={{display:"none"}}/>

      {/* Exception */}
      {excModal&&<div className="overlay" onClick={()=>setExcModal(null)}><div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>🚩 Exceptions · {excModal.control.control_ref}</span><span style={{cursor:"pointer"}} onClick={()=>setExcModal(null)}>✕</span></div>
        <div className="mbody">
          {ctrlExc(excModal.control.id).map(ex=><div key={ex.id} style={{marginBottom:9,border:"1px solid #ded7c4",padding:"9px 11px",background:"#fffdf7"}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}>
              <span style={{fontFamily:"monospace",fontSize:9,padding:"2px 6px",borderRadius:3,background:ex.type==="owner"?"#eaf3de":"#fcebeb",color:ex.type==="owner"?"#27500a":"#a32d2d"}}>{ex.type==="owner"?"OWNER EXC":"TEST EXC"}</span>
              {ex.type==="test"&&<span style={{fontFamily:"monospace",fontSize:9,padding:"2px 6px",borderRadius:3,background:ex.severity==="High"?"#fcebeb":ex.severity==="Medium"?"#faeeda":"#f1efe8",color:ex.severity==="High"?"#a32d2d":"#854f0b"}}>{ex.severity}</span>}
              <span style={{fontFamily:"monospace",fontSize:9,color:"#a59d86",marginLeft:"auto"}}>{new Date(ex.created_at).toLocaleDateString()}</span>
            </div>
            <div style={{fontSize:12,marginBottom:ex.remediation?6:0}}>{ex.description}</div>
            {ex.remediation&&<div style={{fontSize:11,color:"#56503f",background:"#f4f2ec",padding:"5px 7px",borderRadius:3}}><span style={{fontFamily:"monospace",fontSize:9,color:"#8a8472"}}>REMEDIATION: </span>{ex.remediation}{ex.target_date&&<span style={{fontFamily:"monospace",fontSize:9,color:"#185fa5",marginLeft:8}}>by {fmt(ex.target_date)}</span>}</div>}
          </div>)}
          {ctrlExc(excModal.control.id).length===0&&<div style={{fontSize:12,color:"#a59d86",fontStyle:"italic",marginBottom:12}}>No exceptions logged.</div>}
          <div style={{paddingTop:10,borderTop:"1px solid #ded7c4"}}>
            <div className="lbl">Log New Exception</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <div className="lbl">Type</div>
                <select className="fsel" value={excDraft.type} onChange={e=>setExcDraft(d=>({...d,type:e.target.value}))} style={{width:"100%"}}>
                  {!isAdmin&&<option value="owner">Owner Exception</option>}
                  {isAdmin&&<option value="test">Test Exception</option>}
                </select>
              </div>
              {excDraft.type==="test"&&<div style={{flex:1}}>
                <div className="lbl">Severity</div>
                <select className="fsel" value={excDraft.severity} onChange={e=>setExcDraft(d=>({...d,severity:e.target.value}))} style={{width:"100%"}}><option>Low</option><option>Medium</option><option>High</option></select>
              </div>}
            </div>
            <div className="lbl">Description</div>
            <textarea rows={2} value={excDraft.description} onChange={e=>setExcDraft(d=>({...d,description:e.target.value}))} placeholder={excDraft.type==="owner"?"Describe the blocker…":"Describe the finding…"} style={{marginBottom:7}}/>
            {excDraft.type==="test"&&<><div className="lbl">Remediation</div><textarea rows={2} value={excDraft.remediation} onChange={e=>setExcDraft(d=>({...d,remediation:e.target.value}))} style={{marginBottom:7}}/><div className="lbl">Target Date</div><input type="date" value={excDraft.target_date} onChange={e=>setExcDraft(d=>({...d,target_date:e.target.value}))} style={{width:"100%",marginBottom:10}}/></>}
            <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
              <button className="btn bg" onClick={()=>setExcModal(null)}>Cancel</button>
              <button className="btn" style={{background:"#a32d2d",borderColor:"#a32d2d"}} onClick={saveException}>🚩 Log Exception</button>
            </div>
          </div>
        </div>
      </div></div>}

      {/* Email */}
      {emailModal&&<div className="overlay" onClick={()=>setEmailModal(false)}><div className="modal" style={{maxWidth:620}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><span>✉ Send Personalised Reminders</span><span style={{cursor:"pointer"}} onClick={()=>setEmailModal(false)}>✕</span></div>
        <div className="mbody">
          {Object.entries(controls.filter(c=>selectedIds.has(c.id)).reduce((acc,c)=>{const k=c.owner_email||"(no email)";acc[k]=[...(acc[k]||[]),c];return acc;},{})).map(([em,ctrls])=>{
            const name=ctrls[0]?.owner_name||"Owner";
            const byProc=ctrls.reduce((acc,c)=>{const pname=processes.find(p=>p.id===c.process_id)?.name||"?";acc[pname]=[...(acc[pname]||[]),c];return acc;},{});
            const lines=Object.entries(byProc).map(([pn,pc])=>`  ${pn}:\n${pc.map(c=>`    • ${c.control_ref} — ${c.control_description} [${c.status}]${isOverdue(c)?" ⚠ OVERDUE":""}`).join("\n")}`).join("\n\n");
            const body=`Dear ${name},\n\nThis is a reminder that the following ICFR controls assigned to you require attention for ${activePeriod}.\n\nPending Controls:\n\n${lines}\n\nPlease log in to the ICFR tool and take the required action.\n\nBest regards,\nICFR Admin | Sanad Group`;
            return <div key={em} style={{marginBottom:14,border:"1px solid #ded7c4",background:"#fffdf7"}}>
              <div style={{background:"#e6f1fb",padding:"7px 11px",borderBottom:"1px solid #b5d4f4",display:"flex",justifyContent:"space-between"}}>
                <div><div style={{fontFamily:"monospace",fontSize:12,color:"#185fa5",fontWeight:500}}>{em}</div><div style={{fontSize:11,color:"#56503f"}}>{name}</div></div>
                <span style={{fontFamily:"monospace",fontSize:10,color:"#8a8472"}}>{ctrls.length} control{ctrls.length>1?"s":""}</span>
              </div>
              <div style={{padding:"7px 11px"}}>
                <div className="lbl">Email Preview (editable)</div>
                <textarea rows={9} defaultValue={body} style={{fontSize:11,lineHeight:1.6}}/>
              </div>
            </div>;
          })}
          <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
            <button className="btn bg" onClick={()=>setEmailModal(false)}>Cancel</button>
            <button className="btn" style={{background:"#185fa5",borderColor:"#185fa5"}} onClick={()=>{
              const r=new Set(controls.filter(c=>selectedIds.has(c.id)).map(c=>c.owner_email||"?"));
              showToast(`Email sent to ${r.size} recipient(s)`);
              logAudit("EMAIL","BULK",`→ ${[...r].join(", ")}`);
              setSelectedIds(new Set());setEmailModal(false);
            }}>✉ Send All</button>
          </div>
        </div>
      </div></div>}

      {/* TOAST */}
      {toast&&<div style={{position:"fixed",bottom:18,left:"50%",transform:"translateX(-50%)",background:"#26241e",color:"#f4f2ec",padding:"8px 14px",fontSize:12,display:"flex",alignItems:"center",gap:6,zIndex:99,boxShadow:"3px 3px 0 rgba(38,36,30,.2)"}}>
        ⚡ {toast}
      </div>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
